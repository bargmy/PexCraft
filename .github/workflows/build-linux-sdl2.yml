name: Build Linux SDL2 Client

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read

env:
  CHAT_ID: '-1004462705182'

jobs:
  build-linux-sdl2:
    runs-on: ubuntu-latest
    env:
      TOKEN: ${{ secrets.TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libsdl2-dev \
            libsdl2-image-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            zip \
            curl \
            file

      - name: Build and package client directly
        shell: bash
        run: |
          set -o pipefail
          mkdir -p logs build dist

          {
            set -eux
            echo "Workspace: $PWD"
            echo "Top-level files:"
            find . -maxdepth 2 -type f | sort
            echo
            gcc --version
            pkg-config --modversion sdl2
            pkg-config --modversion SDL2_image

            SRC="main_sdl2.c"
            if [ ! -f "$SRC" ]; then
              SRC="src/main_sdl2.c"
            fi
            if [ ! -f "$SRC" ]; then
              echo "ERROR: cannot find main_sdl2.c or src/main_sdl2.c"
              exit 1
            fi

            SDL_CFLAGS="$(pkg-config --cflags sdl2 SDL2_image)"
            SDL_LIBS="$(pkg-config --libs sdl2 SDL2_image)"

            echo "Compiling $SRC"
            gcc -std=c99 -O2 -Wall -Wextra \
              $SDL_CFLAGS \
              "$SRC" \
              -o build/pexcraft_sdl2 \
              $SDL_LIBS \
              -lGL -lGLU -lm -pthread

            file build/pexcraft_sdl2
            ldd build/pexcraft_sdl2 || true

            if [ -d assets ]; then
              cp -a assets build/assets
            fi

            cp -a LICENSE build/LICENSE 2>/dev/null || true

            (cd build && zip -r ../dist/pexcraft-client-linux-sdl2-x64.zip .)
            ls -lh dist/pexcraft-client-linux-sdl2-x64.zip
          } 2>&1 | tee logs/build-linux-sdl2.log

      - name: Print build logs
        if: always()
        shell: bash
        run: |
          echo "===== logs directory ====="
          ls -la logs || true
          echo
          for f in logs/*.log; do
            [ -f "$f" ] || continue
            echo "===== $f ====="
            cat "$f"
            echo
          done

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pexcraft-client-linux-sdl2-logs
          path: logs/*.log
          if-no-files-found: warn

      - name: Upload client zip artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: pexcraft-client-linux-sdl2-x64
          path: dist/pexcraft-client-linux-sdl2-x64.zip
          if-no-files-found: error

      - name: Send client zip to Telegram
        if: success()
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${TOKEN}" ]; then
            echo "TOKEN secret is missing; skipping Telegram upload."
            exit 0
          fi

          ZIP="dist/pexcraft-client-linux-sdl2-x64.zip"
          test -f "$ZIP"

          curl --fail-with-body -sS \
            -X POST "https://api.telegram.org/bot${TOKEN}/sendDocument" \
            -F "chat_id=${CHAT_ID}" \
            -F "caption=PEXCraft client Linux SDL2 x64 build" \
            -F "document=@${ZIP}"
