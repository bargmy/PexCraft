name: Build Linux SDL2 Client

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read

env:
  CHAT_ID: '-1004462705182'

jobs:
  build-linux-sdl2:
    runs-on: ubuntu-latest

    env:
      TOKEN: ${{ secrets.TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libsdl2-dev \
            libsdl2-image-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            zip \
            curl

      - name: Build SDL2 client
        shell: bash
        run: |
          set -o pipefail
          bash ./build_linux_sdl2.sh

      - name: Print build logs
        if: always()
        shell: bash
        run: |
          echo "===== logs directory ====="
          ls -la logs || true
          echo
          for f in logs/*.log; do
            [ -f "$f" ] || continue
            echo "===== $f ====="
            cat "$f"
            echo
          done

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pexcraft-client-linux-sdl2-logs
          path: logs/*.log
          if-no-files-found: warn

      - name: Upload client zip artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: pexcraft-client-linux-sdl2-x64
          path: dist/pexcraft-client-linux-sdl2-x64.zip
          if-no-files-found: error

      - name: Send client zip to Telegram
        if: success()
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${TOKEN}" ]; then
            echo "TOKEN secret is missing; skipping Telegram upload."
            exit 0
          fi

          ZIP="dist/pexcraft-client-linux-sdl2-x64.zip"
          if [ ! -f "$ZIP" ]; then
            echo "Missing $ZIP"
            exit 1
          fi

          curl --fail-with-body -sS \
            -X POST "https://api.telegram.org/bot${TOKEN}/sendDocument" \
            -F "chat_id=${CHAT_ID}" \
            -F "caption=PEXCraft client Linux SDL2 x64 build" \
            -F "document=@${ZIP}"
