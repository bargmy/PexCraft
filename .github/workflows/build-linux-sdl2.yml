name: Build Linux SDL2 Client

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read

env:
  CHAT_ID: :contentReference[oaicite:0]{index=0}  build-linux-sdl2:
    runs-on: ubuntu-latest

    env:
      TOKEN: ${{ secrets.TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux SDL2 dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libsdl2-dev \
            libsdl2-image-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            zip \
            curl

      - name: Build SDL2 client
        run: |
          chmod +x ./build_linux_sdl2.sh
          ./build_linux_sdl2.sh

      - name: Upload GitHub artifact
        uses: actions/upload-artifact@v4
        with:
          name: pexcraft-client-linux-sdl2-x64
          path: dist/pexcraft-client-linux-sdl2-x64.zip

      - name: Send build to Telegram
        shell: bash
        run: |
          if [ -z "${TOKEN}" ]; then
            echo "TOKEN secret is missing; skipping Telegram upload."
            exit 0
          fi

          if [ ! -f "dist/pexcraft-client-linux-sdl2-x64.zip" ]; then
            echo "Build zip not found."
            exit 1
          fi

          curl -sS -X POST "https://api.telegram.org/bot${TOKEN}/sendDocument" \
            -F "chat_id=${CHAT_ID}" \
            -F "caption=PEXCraft client Linux SDL2 x64 build" \
            -F "document=@dist/pexcraft-client-linux-sdl2-x64.zip"
