name: Build Linux SDL2 Client

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-linux-sdl2:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libsdl2-dev libsdl2-image-dev libgl1-mesa-dev libglu1-mesa-dev zip curl

      - name: Build SDL2 client
        run: ./build_linux_sdl2.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pexcraft-client-linux-sdl2-x64
          path: dist/pexcraft-client-linux-sdl2-x64.zip

      - name: Send to Telegram
        if: ${{ secrets.TOKEN != '' }}
        env:
          TOKEN: ${{ secrets.TOKEN }}
          CHAT_ID: '-1004462705182'
        run: |
          curl -sS -X POST "https://api.telegram.org/bot${TOKEN}/sendDocument" \
            -F chat_id="${CHAT_ID}" \
            -F caption="PEXCraft client Linux SDL2 x64 build" \
            -F document=@dist/pexcraft-client-linux-sdl2-x64.zip
