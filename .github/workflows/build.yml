name: Build client Windows x86/x64 and upload to Telegram

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: client ${{ matrix.arch }}
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86
            msystem: MINGW32
            package: mingw-w64-i686-gcc
            out_exe: pexcraft-win-x86.exe
          - arch: x64
            msystem: MINGW64
            package: mingw-w64-x86_64-gcc
            out_exe: pexcraft-win-x64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up MSYS2 MinGW
        uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msystem }}
          update: true
          install: >-
            base-devel
            ${{ matrix.package }}

      - name: Build client
        shell: msys2 {0}
        run: |
          gcc -std=c99 -O2 -Wall -Wextra -mwindows main.c -o pexcraft.exe \
            -static -static-libgcc \
            -ld3d11 -ldxgi -ld3dcompiler -ld3d9 -lopengl32 -lglu32 \
            -lgdi32 -luser32 -lshell32 -lole32 -lwindowscodecs -lcomdlg32 -lwinmm -lws2_32 -lm

      - name: Package zip
        shell: pwsh
        run: |
          $arch = '${{ matrix.arch }}'
          $distRoot = Join-Path $env:GITHUB_WORKSPACE 'dist'
          $packageName = "client-windows-$arch"
          $packageDir = Join-Path $distRoot $packageName
          New-Item -ItemType Directory -Force -Path $packageDir | Out-Null

          Copy-Item 'pexcraft.exe' (Join-Path $packageDir '${{ matrix.out_exe }}') -Force
          if (Test-Path 'assets') {
            Copy-Item 'assets' (Join-Path $packageDir 'assets') -Recurse -Force
          }

          $zipPath = Join-Path $distRoot "$packageName.zip"
          Compress-Archive -Path (Join-Path $packageDir '*') -DestinationPath $zipPath -Force
          "ZIP_PATH=$zipPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Upload GitHub artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-windows-${{ matrix.arch }}
          path: ${{ env.ZIP_PATH }}
          if-no-files-found: error

  telegram:
    name: Send one Telegram message with both client builds
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'

    steps:
      - name: Download x86/x64 artifacts
        uses: actions/download-artifact@v4
        with:
          path: telegram_upload

      - name: Send one Telegram message with two zip attachments
        env:
          TOKEN: ${{ secrets.TOKEN }}
          CHAT_ID: '-1004462705182'
        run: |
          set -euo pipefail

          if [ -z "${TOKEN}" ]; then
            echo 'Missing Telegram bot token. Add it as repository secret TOKEN.' >&2
            exit 1
          fi

          X86_ZIP="telegram_upload/client-windows-x86/client-windows-x86.zip"
          X64_ZIP="telegram_upload/client-windows-x64/client-windows-x64.zip"

          test -f "$X86_ZIP"
          test -f "$X64_ZIP"

          CAPTION="client Windows builds\nRepo: ${GITHUB_REPOSITORY}\nCommit: ${GITHUB_SHA}"
          MEDIA="[{\"type\":\"document\",\"media\":\"attach://client_x86\",\"caption\":\"${CAPTION}\"},{\"type\":\"document\",\"media\":\"attach://client_x64\"}]"

          curl --fail -sS -X POST "https://api.telegram.org/bot${TOKEN}/sendMediaGroup" \
            -F "chat_id=${CHAT_ID}" \
            -F "media=${MEDIA}" \
            -F "client_x86=@${X86_ZIP}" \
            -F "client_x64=@${X64_ZIP}"
