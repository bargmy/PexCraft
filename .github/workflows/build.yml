name: Build PexCraft

run-name: Build "${{ github.event.head_commit.message || github.ref_name }}"

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

jobs:
  linux-sdl2:
    name: Linux SDL2/OpenGL
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read commit name
        id: commit
        shell: bash
        run: |
          name="$(git log -1 --pretty=%s)"
          safe="$(printf '%s' "$name" | tr -cs 'A-Za-z0-9._-' '-' | sed 's/^-//;s/-$//' | cut -c1-80)"
          [ -n "$safe" ] || safe="commit"

          echo "name=$name" >> "$GITHUB_OUTPUT"
          echo "safe=$safe" >> "$GITHUB_OUTPUT"

          mkdir -p build logs
          {
            echo "Commit name: $name"
            echo "Commit SHA:  $GITHUB_SHA"
          } > build/COMMIT_NAME.txt

          echo "### Linux SDL2/OpenGL" >> "$GITHUB_STEP_SUMMARY"
          echo "Commit name: \`$name\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Install dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libsdl2-dev \
            libsdl2-image-dev \
            libcurl4-openssl-dev \
            zlib1g-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev

      - name: Build Linux SDL2/OpenGL
        shell: bash
        run: |
          set -o pipefail
          mkdir -p build logs
          make -f Makefile.linux_sdl2 2>&1 | tee logs/build-linux-sdl2.log

      - name: Upload Linux SDL2/OpenGL artifact
        uses: actions/upload-artifact@v4
        with:
          name: pexcraft-linux-sdl2-${{ steps.commit.outputs.safe }}-${{ github.sha }}
          if-no-files-found: warn
          path: |
            build/**
            logs/**
            *.log

  windows-msvc:
    name: Windows MSVC x64 / Direct3D
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read commit name
        id: commit
        shell: bash
        run: |
          name="$(git log -1 --pretty=%s)"
          safe="$(printf '%s' "$name" | tr -cs 'A-Za-z0-9._-' '-' | sed 's/^-//;s/-$//' | cut -c1-80)"
          [ -n "$safe" ] || safe="commit"

          echo "name=$name" >> "$GITHUB_OUTPUT"
          echo "safe=$safe" >> "$GITHUB_OUTPUT"

          mkdir -p build logs
          {
            echo "Commit name: $name"
            echo "Commit SHA:  $GITHUB_SHA"
          } > build/COMMIT_NAME.txt

          echo "### Windows MSVC x64 / Direct3D" >> "$GITHUB_STEP_SUMMARY"
          echo "Commit name: \`$name\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Setup MSVC developer command prompt
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Build Windows x64
        shell: cmd
        run: |
          if not exist logs mkdir logs
          call build_x64.bat > logs\build-windows-msvc-x64.log 2>&1

      - name: Upload Windows MSVC artifact
        uses: actions/upload-artifact@v4
        with:
          name: pexcraft-windows-msvc-x64-${{ steps.commit.outputs.safe }}-${{ github.sha }}
          if-no-files-found: warn
          path: |
            build/**
            logs/**
            *.exe
            *.dll
            *.pdb

  windows-mingw:
    name: Windows MinGW cross-build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read commit name
        id: commit
        shell: bash
        run: |
          name="$(git log -1 --pretty=%s)"
          safe="$(printf '%s' "$name" | tr -cs 'A-Za-z0-9._-' '-' | sed 's/^-//;s/-$//' | cut -c1-80)"
          [ -n "$safe" ] || safe="commit"

          echo "name=$name" >> "$GITHUB_OUTPUT"
          echo "safe=$safe" >> "$GITHUB_OUTPUT"

          mkdir -p build logs
          {
            echo "Commit name: $name"
            echo "Commit SHA:  $GITHUB_SHA"
          } > build/COMMIT_NAME.txt

          echo "### Windows MinGW cross-build" >> "$GITHUB_STEP_SUMMARY"
          echo "Commit name: \`$name\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Install MinGW dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            mingw-w64 \
            zip \
            zlib1g-dev

      - name: Build Windows MinGW
        shell: bash
        run: |
          set -o pipefail
          mkdir -p build logs
          make -f Makefile.mingw 2>&1 | tee logs/build-windows-mingw.log

      - name: Upload Windows MinGW artifact
        uses: actions/upload-artifact@v4
        with:
          name: pexcraft-windows-mingw-${{ steps.commit.outputs.safe }}-${{ github.sha }}
          if-no-files-found: warn
          path: |
            build/**
            logs/**
            *.exe
            *.dll
            *.zip

  psp:
    name: PSP build
    runs-on: ubuntu-latest
    container:
      image: pspdev/pspdev:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read commit name
        id: commit
        shell: bash
        run: |
          name="$(git log -1 --pretty=%s)"
          safe="$(printf '%s' "$name" | tr -cs 'A-Za-z0-9._-' '-' | sed 's/^-//;s/-$//' | cut -c1-80)"
          [ -n "$safe" ] || safe="commit"

          echo "name=$name" >> "$GITHUB_OUTPUT"
          echo "safe=$safe" >> "$GITHUB_OUTPUT"

          mkdir -p build logs
          {
            echo "Commit name: $name"
            echo "Commit SHA:  $GITHUB_SHA"
          } > build/COMMIT_NAME.txt

          echo "### PSP build" >> "$GITHUB_STEP_SUMMARY"
          echo "Commit name: \`$name\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Build PSP
        shell: bash
        run: |
          set -o pipefail
          mkdir -p build logs
          make -f Makefile.psp 2>&1 | tee logs/build-psp.log

      - name: Upload PSP artifact
        uses: actions/upload-artifact@v4
        with:
          name: pexcraft-psp-${{ steps.commit.outputs.safe }}-${{ github.sha }}
          if-no-files-found: warn
          path: |
            build/**
            logs/**
            EBOOT.PBP
            PARAM.SFO
            *.elf
            *.prx
            *.pbp
            *.zip