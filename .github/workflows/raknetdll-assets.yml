name: RakNetDLL Assets

on:
  workflow_dispatch:
  push:
    paths:
      - 'multiplayer/mcpe/protocol_81/workflow/fetch_raknetdll.py'
      - '.github/workflows/raknetdll-assets.yml'

jobs:
  fetch-raknetdll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download and normalize RakNetDLL assets
        run: python3 multiplayer/mcpe/protocol_81/workflow/fetch_raknetdll.py
      - name: Upload normalized RakNetDLL assets
        uses: actions/upload-artifact@v4
        with:
          name: raknetdll-normalized
          path: multiplayer/mcpe/protocol_81/transport/bin/
