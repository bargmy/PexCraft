          echo "name=$name" >> "$GITHUB_OUTPUT"

      - name: Cache Emscripten SDK
        uses: actions/cache@v4
        with:
          path: .cache/emsdk
          key: emsdk-6.0.2-${{ runner.os }}

      - name: Build one standalone WASM HTML
        shell: bash
        run: ./build_wasm.sh

      - name: Verify Telegram-only WASM output
        shell: bash
        run: |
          test -s dist/PexCraft-WASM.html
          test "$(find dist -maxdepth 1 -type f | wc -l | tr -d ' ')" = "1"
          echo "The WASM job produced only dist/PexCraft-WASM.html and does not publish a GitHub artifact or release."

      - name: Upload standalone HTML directly to Telegram
        if: github.event_name != 'pull_request'
        env:
          TOKEN: ${{ secrets.TOKEN }}
          CHAT_ID: ${{ env.CHAT_ID }}
          FILE_PATH: dist/PexCraft-WASM.html
          COMMIT_NAME: ${{ steps.commit.outputs.name }}
          BUILDER: WebAssembly single-file HTML
        shell: bash
        run: python3 .github/scripts/telegram_upload_file.py
