          echo "Commit name: \`${{ steps.commit.outputs.name }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "No Telegram upload produced for this builder." >> "$GITHUB_STEP_SUMMARY"

  lgwebos:
    needs: notify_build_start
    name: LG webOS ${{ matrix.arch }} - ${{ github.event.head_commit.message || github.ref_name }}
    if: >-
      ${{
        !contains(github.event.head_commit.message || github.event.pull_request.title || github.ref_name, '(xbox-only)') &&
        (
          contains(github.event.head_commit.message || github.event.pull_request.title || github.ref_name, '(lg-only)') ||
          (
          !contains(github.event.head_commit.message || github.event.pull_request.title || github.ref_name, '(win-only)') &&
          !contains(github.event.head_commit.message || github.event.pull_request.title || github.ref_name, '(linux-only)') &&
          !contains(github.event.head_commit.message || github.event.pull_request.title || github.ref_name, '(android-only)') &&
          !contains(github.event.head_commit.message || github.event.pull_request.title || github.ref_name, '(androidtv-only)') &&
          !contains(github.event.head_commit.message || github.event.pull_request.title || github.ref_name, '(wii-only)') &&
          !contains(github.event.head_commit.message || github.event.pull_request.title || github.ref_name, '(psp-only)') &&
          !contains(github.event.head_commit.message || github.event.pull_request.title || github.ref_name, '(console-only)')
          )
        )
      }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: armv7
            toolchain_url: https://github.com/openlgtv/buildroot-nc4/releases/latest/download/arm-webos-linux-gnueabi_sdk-buildroot-x86_64.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          set-safe-directory: true

      - name: Read commit name
        id: commit
        shell: bash
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE" || true
          name="$(git log -1 --pretty=%s 2>/dev/null || true)"
          [ -n "$name" ] || name="${{ github.event.head_commit.message || github.ref_name }}"
          safe="$(printf '%s' "$name" | tr -cs 'A-Za-z0-9._-' '-' | sed 's/^-//;s/-$//' | cut -c1-80)"
          [ -n "$safe" ] || safe="commit"
          echo "name=$name" >> "$GITHUB_OUTPUT"
          echo "safe=$safe" >> "$GITHUB_OUTPUT"

      - name: Install LG webOS build dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            make \
            pkg-config \
            python3 \
            curl \
            tar \
            xz-utils \
            bzip2 \
            file \
            nodejs \
            npm
          sudo npm install -g @webos-tools/cli

      - name: Install LG webOS native toolchain
        shell: bash
        run: |
          set -euxo pipefail

          toolchain_root="$PWD/build/lgwebos_toolchain"
          archive="$toolchain_root/toolchain.tar.gz"

          rm -rf "$toolchain_root"
          mkdir -p "$toolchain_root"

          curl -L "${{ matrix.toolchain_url }}" -o "$archive"
          file "$archive" || true
          tar -xaf "$archive" -C "$toolchain_root"

          echo "Extracted SDK layout:"
          find "$toolchain_root" -maxdepth 3 -type d | sort > "$toolchain_root/sdk-dirs.txt"
          sed -n '1,80{s#^#  #;p}' "$toolchain_root/sdk-dirs.txt"

          sdk_dir="$(find "$toolchain_root" -type d -name 'arm-webos-linux-gnueabi_sdk-buildroot' -print -quit)"
          if [ -z "$sdk_dir" ]; then
            sdk_dir="$(find "$toolchain_root" -type f -name 'relocate-sdk.sh' -printf '%h\n' -quit)"
          fi
          test -n "$sdk_dir"

          if [ -x "$sdk_dir/relocate-sdk.sh" ]; then
            (cd "$sdk_dir" && ./relocate-sdk.sh)
          fi

          toolchain_file="$(find "$sdk_dir" -type f \( \
              -name 'toolchainfile.cmake' -o \
              -name '*toolchain*.cmake' -o \
              -name 'OEToolchainConfig.cmake' \
            \) -print -quit)"

          if [ -z "$toolchain_file" ] || [ ! -f "$toolchain_file" ]; then
            echo "No CMake toolchain file found under: $sdk_dir" >&2
            find "$sdk_dir" -maxdepth 6 -type f | sort > "$toolchain_root/sdk-files.txt"
            sed -n '1,200{s#^#  #;p}' "$toolchain_root/sdk-files.txt" >&2
            exit 1
          fi

          toolchain_file="$(realpath "$toolchain_file")"
          echo "Using LG webOS SDK dir: $sdk_dir"
          echo "Using LG webOS CMake toolchain: $toolchain_file"
          echo "LGWEBOS_TOOLCHAIN_FILE=$toolchain_file" >> "$GITHUB_ENV"

      - name: Extract LG webOS icon from client.jar
        shell: bash
        run: |
          set -euxo pipefail
          python3 tools/extract_lgwebos_icon.py webos/generated/icon.png build/lgwebos_work/client.jar
          test -s webos/generated/icon.png

      - name: Build LG webOS native client
        shell: bash
        run: |
          set +e
          set -o pipefail
          mkdir -p build logs dist

          {
            echo "Commit name: ${{ steps.commit.outputs.name }}"
            echo "Commit SHA:  $GITHUB_SHA"
            echo "Builder:     LG webOS ${{ matrix.arch }}"
            echo
            cmake -S webos -B build/lgwebos-${{ matrix.arch }} \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_TOOLCHAIN_FILE:FILEPATH="$LGWEBOS_TOOLCHAIN_FILE"
            cmake --build build/lgwebos-${{ matrix.arch }} -- -j"$(nproc)"

            status=$?
            echo "$status" > build/lgwebos-build-status.txt
            if [ "$status" -eq 0 ]; then
              echo "LGWEBOS_BUILD_OK=1" >> "$GITHUB_ENV"
            else
              echo "LGWEBOS_BUILD_OK=0" >> "$GITHUB_ENV"
            fi
            exit "$status"
          } 2>&1 | tee logs/build-lgwebos-${{ matrix.arch }}.log
          exit ${PIPESTATUS[0]}

      - name: Package LG webOS IPK
        if: env.LGWEBOS_BUILD_OK == '1'
        shell: bash
        run: |
          set -euxo pipefail
          package_dir="build/lgwebos-package-${{ matrix.arch }}"
          rm -rf "$package_dir"
          cmake --install build/lgwebos-${{ matrix.arch }} --prefix "$package_dir"
          cp -R logs "$package_dir/logs" || true
          cat > "$package_dir/COMMIT_NAME.txt" <<EOF
          Commit name: ${{ steps.commit.outputs.name }}
          Commit SHA:  $GITHUB_SHA
          Builder:     LG webOS ${{ matrix.arch }}
          EOF

          rm -f ir.hienob.pexcraft_*.ipk ./*.ipk

          # Newer npm/Node combinations can make @webos-tools/cli finish the
          # package and then fail during cleanup with "rimraf is not a function".
          # Keep the produced IPK if it exists; fail only when packaging produced none.
          set +e
          ares-package --no-minify "$package_dir"
          ares_status=$?
          set -e

          ipk="$(find "$PWD" -maxdepth 1 -type f -name 'ir.hienob.pexcraft_*.ipk' -print -quit)"
          if [ -z "$ipk" ]; then
            ipk="$(find "$PWD" -maxdepth 1 -type f -name '*.ipk' -print -quit)"
          fi

          if [ -z "$ipk" ]; then
            echo "ares-package failed with status $ares_status and produced no IPK" >&2
            exit "${ares_status:-1}"
          fi

          if [ "$ares_status" -ne 0 ]; then
            echo "ares-package exited with status $ares_status after producing $ipk; continuing" >&2
          fi

          mkdir -p dist
          final="dist/pexcraft-lgwebos-${{ matrix.arch }}.ipk"
          mv -f "$ipk" "$final"
          echo "IPK_PATH=$final" >> "$GITHUB_ENV"

      - name: Upload LG webOS build to Telegram
        if: env.LGWEBOS_BUILD_OK == '1' && github.event_name != 'pull_request'
        env:
          TOKEN: ${{ secrets.TOKEN }}
          CHAT_ID: ${{ env.CHAT_ID }}
          FILE_PATH: ${{ env.IPK_PATH }}
          COMMIT_NAME: ${{ steps.commit.outputs.name }}
          BUILDER: LG webOS ${{ matrix.arch }}
        shell: bash
        run: python3 .github/scripts/telegram_upload_file.py

      - name: Mark failed build in summary
        if: always() && env.LGWEBOS_BUILD_OK != '1'
        shell: bash
        run: |
          echo "### LG webOS ${{ matrix.arch }} failed" >> "$GITHUB_STEP_SUMMARY"
          echo "Commit name: \`${{ steps.commit.outputs.name }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "No Telegram upload produced for this builder." >> "$GITHUB_STEP_SUMMARY"

  android:
    needs: notify_build_start
    name: Android universal APK - ${{ github.event.head_commit.message || github.ref_name }}
    if: >-
      ${{
        contains(github.event.head_commit.message || github.event.pull_request.title || github.ref_name, '(android-only)') ||
        (
          !contains(github.event.head_commit.message || github.event.pull_request.title || github.ref_name, '(win-only)') &&
          !contains(github.event.head_commit.message || github.event.pull_request.title || github.ref_name, '(linux-only)') &&
          !contains(github.event.head_commit.message || github.event.pull_request.title || github.ref_name, '(androidtv-only)') &&
          !contains(github.event.head_commit.message || github.event.pull_request.title || github.ref_name, '(wii-only)') &&
          !contains(github.event.head_commit.message || github.event.pull_request.title || github.ref_name, '(psp-only)') &&
          !contains(github.event.head_commit.message || github.event.pull_request.title || github.ref_name, '(console-only)') &&
          !contains(github.event.head_commit.message || github.event.pull_request.title || github.ref_name, '(lg-only)') &&
          !contains(github.event.head_commit.message || github.event.pull_request.title || github.ref_name, '(xbox-only)')
        )
      }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          set-safe-directory: true

      - name: Read commit name
        id: commit
        shell: bash
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE" || true
          name="$(git log -1 --pretty=%s 2>/dev/null || true)"
          [ -n "$name" ] || name="${{ github.event.head_commit.message || github.ref_name }}"
          safe="$(printf '%s' "$name" | tr -cs 'A-Za-z0-9._-' '-' | sed 's/^-//;s/-$//' | cut -c1-80)"
          [ -n "$safe" ] || safe="commit"
          echo "name=$name" >> "$GITHUB_OUTPUT"
          echo "safe=$safe" >> "$GITHUB_OUTPUT"

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2

      - name: Install Android build packages
        shell: bash
        env:
          PEXCRAFT_NDK_VERSION: 27.2.12479018
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y curl unzip python3
          yes | sdkmanager --licenses >/dev/null || true

          # AGP has previously tried to auto-install its default NDK and left a
          # corrupt partial directory/cache behind. Remove both the unwanted
          # default NDK and the NDK we actually use before the explicit install.
          rm -rf "$ANDROID_HOME/ndk/27.0.12077973" "$ANDROID_HOME/ndk/$PEXCRAFT_NDK_VERSION" ~/.android/cache || true

          for attempt in 1 2 3; do
            if sdkmanager --install \
              "platform-tools" \
              "platforms;android-35" \
              "build-tools;35.0.0" \
              "cmake;3.22.1" \
              "ndk;$PEXCRAFT_NDK_VERSION"; then
              break
            fi
            rm -rf "$ANDROID_HOME/ndk/27.0.12077973" "$ANDROID_HOME/ndk/$PEXCRAFT_NDK_VERSION" ~/.android/cache || true
            if [ "$attempt" -eq 3 ]; then exit 1; fi
            sleep 5
          done

          test -x "$ANDROID_HOME/ndk/$PEXCRAFT_NDK_VERSION/toolchains/llvm/prebuilt/linux-x86_64/bin/clang"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/$PEXCRAFT_NDK_VERSION" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/$PEXCRAFT_NDK_VERSION" >> "$GITHUB_ENV"

      - name: Prepare SDL2 Android dependency
        shell: bash
        run: |
          chmod +x android/*.sh || true
          bash android/prepare_sdl2.sh

      - name: Decode release signing key
        env:
          SIGN_BASE64: ${{ secrets.sign }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD || secrets.SIGN_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS || secrets.SIGN_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD || secrets.SIGN_KEY_PASSWORD }}
        shell: bash
        run: |
          if [ -n "${SIGN_BASE64:-}" ]; then
            mkdir -p android/app/signing
            printf '%s' "$SIGN_BASE64" | tr -d '\r\n ' | base64 -d > android/app/signing/release.jks
            echo "SIGNING_STORE_FILE=$PWD/android/app/signing/release.jks" >> "$GITHUB_ENV"
            echo "Android signing key decoded from repository secret: sign"

            if [ -n "${SIGNING_STORE_PASSWORD:-}" ]; then
              alias_name="${SIGNING_KEY_ALIAS:-pexcraft_android_tv}"
              keytool -list \
                -keystore android/app/signing/release.jks \
                -storepass "$SIGNING_STORE_PASSWORD" \
                -alias "$alias_name" >/dev/null
              echo "Android signing key alias validated: $alias_name"

              key_password="${SIGNING_KEY_PASSWORD:-$SIGNING_STORE_PASSWORD}"
              tmpdir="$(mktemp -d)"
              printf 'pexcraft android signing smoke test\n' > "$tmpdir/test.txt"
              (cd "$tmpdir" && jar cf signing-test.jar test.txt)
              jarsigner \
                -keystore android/app/signing/release.jks \
                -storepass "$SIGNING_STORE_PASSWORD" \
                -keypass "$key_password" \
                "$tmpdir/signing-test.jar" \
                "$alias_name" >/dev/null
              echo "Android signing key password validated."
            else
              echo "Repository secret SIGNING_STORE_PASSWORD is missing. Gradle signing will fail unless the APK is built unsigned." >&2
              exit 1
            fi
          else
            echo "No repository secret named 'sign' was provided; Gradle will produce an unsigned release APK."
          fi

      - name: Build Android universal APK
        env:
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD || secrets.SIGN_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS || secrets.SIGN_KEY_ALIAS || 'pexcraft_android_tv' }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD || secrets.SIGN_KEY_PASSWORD }}
        shell: bash
        run: |
          set +e
          set -o pipefail
          mkdir -p build logs dist
          {
            echo "Commit name: ${{ steps.commit.outputs.name }}"
            echo "Commit SHA:  $GITHUB_SHA"
            echo "Builder:     Android universal APK"
            echo
            cd android
            gradle assembleRelease
            status=$?
            cd ..
            echo "$status" > build/android-build-status.txt
            if [ "$status" -eq 0 ]; then
              echo "ANDROID_BUILD_OK=1" >> "$GITHUB_ENV"
            else
              echo "ANDROID_BUILD_OK=0" >> "$GITHUB_ENV"
            fi
            exit "$status"
          } 2>&1 | tee logs/build-android-universal.log
          exit ${PIPESTATUS[0]}

      - name: Package Android universal APK
        if: env.ANDROID_BUILD_OK == '1'
        shell: bash
        run: |
          set -euxo pipefail
          apk="$(find android/app/build/outputs/apk/release -type f -name '*.apk' -print -quit)"
          test -n "$apk"
          mkdir -p dist
          final="dist/pexcraft-android-universal.apk"
          cp -f "$apk" "$final"
          echo "APK_PATH=$final" >> "$GITHUB_ENV"

      - name: Upload Android universal build to Telegram
        if: env.ANDROID_BUILD_OK == '1' && github.event_name != 'pull_request'
        env:
          TOKEN: ${{ secrets.TOKEN }}
          CHAT_ID: ${{ env.CHAT_ID }}
          FILE_PATH: ${{ env.APK_PATH }}
          COMMIT_NAME: ${{ steps.commit.outputs.name }}
          BUILDER: Android universal APK
        shell: bash
        run: python3 .github/scripts/telegram_upload_file.py

      - name: Mark failed build in summary
        if: always() && env.ANDROID_BUILD_OK != '1'
        shell: bash
        run: |
          echo "### Android universal APK failed" >> "$GITHUB_STEP_SUMMARY"
          echo "Commit name: `${{ steps.commit.outputs.name }}`" >> "$GITHUB_STEP_SUMMARY"
          echo "No Telegram upload produced for this builder." >> "$GITHUB_STEP_SUMMARY"

  android_tv:
    needs: notify_build_start
    name: Android TV APK - ${{ github.event.head_commit.message || github.ref_name }}
    if: >-
      ${{
        contains(github.event.head_commit.message || github.event.pull_request.title || github.ref_name, '(androidtv-only)') ||
        (
          !contains(github.event.head_commit.message || github.event.pull_request.title || github.ref_name, '(win-only)') &&
          !contains(github.event.head_commit.message || github.event.pull_request.title || github.ref_name, '(linux-only)') &&
          !contains(github.event.head_commit.message || github.event.pull_request.title || github.ref_name, '(android-only)') &&
          !contains(github.event.head_commit.message || github.event.pull_request.title || github.ref_name, '(wii-only)') &&
          !contains(github.event.head_commit.message || github.event.pull_request.title || github.ref_name, '(psp-only)') &&
          !contains(github.event.head_commit.message || github.event.pull_request.title || github.ref_name, '(console-only)') &&
          !contains(github.event.head_commit.message || github.event.pull_request.title || github.ref_name, '(lg-only)') &&
          !contains(github.event.head_commit.message || github.event.pull_request.title || github.ref_name, '(xbox-only)')
        )
      }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          set-safe-directory: true

      - name: Read commit name
        id: commit
        shell: bash
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE" || true
          name="$(git log -1 --pretty=%s 2>/dev/null || true)"
          [ -n "$name" ] || name="${{ github.event.head_commit.message || github.ref_name }}"
          safe="$(printf '%s' "$name" | tr -cs 'A-Za-z0-9._-' '-' | sed 's/^-//;s/-$//' | cut -c1-80)"
          [ -n "$safe" ] || safe="commit"
          echo "name=$name" >> "$GITHUB_OUTPUT"
          echo "safe=$safe" >> "$GITHUB_OUTPUT"


      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2

      - name: Install Android build packages
        shell: bash
        env:
          PEXCRAFT_NDK_VERSION: 27.2.12479018
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y curl unzip python3
          yes | sdkmanager --licenses >/dev/null || true

          # AGP has previously tried to auto-install its default NDK and left a
          # corrupt partial directory/cache behind. Remove both the unwanted
          # default NDK and the NDK we actually use before the explicit install.
          rm -rf "$ANDROID_HOME/ndk/27.0.12077973" "$ANDROID_HOME/ndk/$PEXCRAFT_NDK_VERSION" ~/.android/cache || true

          for attempt in 1 2 3; do
            if sdkmanager --install \
              "platform-tools" \
              "platforms;android-35" \
              "build-tools;35.0.0" \
              "cmake;3.22.1" \
              "ndk;$PEXCRAFT_NDK_VERSION"; then
              break
            fi
            rm -rf "$ANDROID_HOME/ndk/27.0.12077973" "$ANDROID_HOME/ndk/$PEXCRAFT_NDK_VERSION" ~/.android/cache || true
            if [ "$attempt" -eq 3 ]; then exit 1; fi
            sleep 5
          done

          test -x "$ANDROID_HOME/ndk/$PEXCRAFT_NDK_VERSION/toolchains/llvm/prebuilt/linux-x86_64/bin/clang"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/$PEXCRAFT_NDK_VERSION" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/$PEXCRAFT_NDK_VERSION" >> "$GITHUB_ENV"

      - name: Prepare SDL2 Android dependency
        shell: bash
        run: |
          chmod +x android_tv/*.sh || true
          bash android_tv/prepare_sdl2.sh

      - name: Decode release signing key
        env:
          SIGN_BASE64: ${{ secrets.sign }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD || secrets.SIGN_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS || secrets.SIGN_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD || secrets.SIGN_KEY_PASSWORD }}
        shell: bash
        run: |
          if [ -n "${SIGN_BASE64:-}" ]; then
            mkdir -p android_tv/app/signing
            printf '%s' "$SIGN_BASE64" | tr -d '\r\n ' | base64 -d > android_tv/app/signing/release.jks
            echo "SIGNING_STORE_FILE=$PWD/android_tv/app/signing/release.jks" >> "$GITHUB_ENV"
            echo "Android TV signing key decoded from repository secret: sign"

            if [ -n "${SIGNING_STORE_PASSWORD:-}" ]; then
              alias_name="${SIGNING_KEY_ALIAS:-pexcraft_android_tv}"
              keytool -list \
                -keystore android_tv/app/signing/release.jks \
                -storepass "$SIGNING_STORE_PASSWORD" \
                -alias "$alias_name" >/dev/null
              echo "Android TV signing key alias validated: $alias_name"

              key_password="${SIGNING_KEY_PASSWORD:-$SIGNING_STORE_PASSWORD}"
              tmpdir="$(mktemp -d)"
              printf 'pexcraft signing smoke test\n' > "$tmpdir/test.txt"
              (cd "$tmpdir" && jar cf signing-test.jar test.txt)
              jarsigner \
                -keystore android_tv/app/signing/release.jks \
                -storepass "$SIGNING_STORE_PASSWORD" \
                -keypass "$key_password" \
                "$tmpdir/signing-test.jar" \
                "$alias_name" >/dev/null
              echo "Android TV signing key password validated."
            else
              echo "Repository secret SIGNING_STORE_PASSWORD is missing. Gradle signing will fail unless the APK is built unsigned." >&2
              exit 1
            fi
          else
            echo "No repository secret named 'sign' was provided; Gradle will produce an unsigned release APK."
          fi

      - name: Build Android TV APK
        env:
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD || secrets.SIGN_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS || secrets.SIGN_KEY_ALIAS || 'pexcraft_android_tv' }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD || secrets.SIGN_KEY_PASSWORD }}
        shell: bash
        run: |
          set +e
          set -o pipefail
          mkdir -p build logs dist
          {
            echo "Commit name: ${{ steps.commit.outputs.name }}"
            echo "Commit SHA:  $GITHUB_SHA"
            echo "Builder:     Android TV APK"
            echo
            cd android_tv
            gradle assembleRelease
            status=$?
            cd ..
            echo "$status" > build/android-tv-build-status.txt
            if [ "$status" -eq 0 ]; then
              echo "ANDROID_TV_BUILD_OK=1" >> "$GITHUB_ENV"
            else
              echo "ANDROID_TV_BUILD_OK=0" >> "$GITHUB_ENV"
            fi
            exit "$status"
          } 2>&1 | tee logs/build-android-tv.log
          exit ${PIPESTATUS[0]}

      - name: Package Android TV APK
        if: env.ANDROID_TV_BUILD_OK == '1'
        shell: bash
        run: |
          set -euxo pipefail
          apk="$(find android_tv/app/build/outputs/apk/release -type f -name '*.apk' -print -quit)"
          test -n "$apk"
          mkdir -p dist
          final="dist/pexcraft-android-tv.apk"
          cp -f "$apk" "$final"
          echo "APK_PATH=$final" >> "$GITHUB_ENV"

      - name: Upload Android TV build to Telegram
        if: env.ANDROID_TV_BUILD_OK == '1' && github.event_name != 'pull_request'
        env:
          TOKEN: ${{ secrets.TOKEN }}
          CHAT_ID: ${{ env.CHAT_ID }}
          FILE_PATH: ${{ env.APK_PATH }}
          COMMIT_NAME: ${{ steps.commit.outputs.name }}
          BUILDER: Android TV APK
        shell: bash
        run: python3 .github/scripts/telegram_upload_file.py

      - name: Mark failed build in summary
        if: always() && env.ANDROID_TV_BUILD_OK != '1'
        shell: bash
        run: |
          echo "### Android TV APK failed" >> "$GITHUB_STEP_SUMMARY"
          echo "Commit name: \`${{ steps.commit.outputs.name }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "No Telegram upload produced for this builder." >> "$GITHUB_STEP_SUMMARY"

  wii:
    needs: notify_build_start
    name: Nintendo Wii DOL - ${{ github.event.head_commit.message || github.ref_name }}
    if: >-
      ${{
        contains(github.event.head_commit.message || github.event.pull_request.title || github.ref_name, '(console-only)') ||
        contains(github.event.head_commit.message || github.event.pull_request.title || github.ref_name, '(wii-only)')
      }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          set-safe-directory: true

      - name: Read commit name
        id: commit
        shell: bash
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE" || true
          name="$(git log -1 --pretty=%s 2>/dev/null || true)"
          [ -n "$name" ] || name="${{ github.event.head_commit.message || github.ref_name }}"
          safe="$(printf '%s' "$name" | tr -cs 'A-Za-z0-9._-' '-' | sed 's/^-//;s/-$//' | cut -c1-80)"
          [ -n "$safe" ] || safe="commit"
          echo "name=$name" >> "$GITHUB_OUTPUT"
          echo "safe=$safe" >> "$GITHUB_OUTPUT"

      - name: Prepare Wii embedded texture bundle
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y python3-pil
          python3 tools/prepare_wii_assets.py \
            build/wii_generated/assets \
            build/wii_generated/wii_mcrw_assets.pak \
            build/wii_generated/wii_mcrw_assets.S

      - name: Build Wii DOL
        shell: bash
        run: |
          set +e
          set -o pipefail
          mkdir -p build logs dist
          {
            echo "Commit name: ${{ steps.commit.outputs.name }}"
            echo "Commit SHA:  $GITHUB_SHA"
            echo "Builder:     Nintendo Wii / devkitPPC + libogc"
            echo "Textures:    client.jar-derived MCRW bundle linked into boot.dol"
            echo
            docker pull devkitpro/devkitppc:20260503
            docker run --rm \
              -v "$PWD:/work" \
              -w /work \
              devkitpro/devkitppc:20260503 \
              bash -lc 'make -f platforms/wii/Makefile.wii'
            status=$?
            if [ "$status" -eq 0 ]; then
              dol_size=$(wc -c < build/wii/boot.dol)
              echo "boot.dol size: ${dol_size} bytes"
              # A normal embedded-texture Wii DOL should be single-digit MB.
              # Anything near hundreds of MB means a bad linker section address/hole.
              if [ "$dol_size" -gt 16777216 ]; then
                echo "ERROR: boot.dol is too large (${dol_size} bytes). Refusing artifact. Check uncompressed size, not zip size."
                status=1
              fi
            fi
            echo "$status" > build/wii-build-status.txt
            if [ "$status" -eq 0 ]; then
              echo "WII_BUILD_OK=1" >> "$GITHUB_ENV"
            else
              echo "WII_BUILD_OK=0" >> "$GITHUB_ENV"
            fi
            exit "$status"
          } 2>&1 | tee logs/build-wii.log

      - name: Package Wii app zip
        if: env.WII_BUILD_OK == '1'
        shell: bash
        run: |
          set -euxo pipefail
          artifact_prefix="pexcraft-wii"
          package_dir="dist/$artifact_prefix"
          app_dir="$package_dir/apps/pexcraft"

          rm -rf "$package_dir"
          mkdir -p "$app_dir"

          cp -f build/wii/boot.dol "$app_dir/boot.dol"
          cp -f build/wii/pexcraft-wii.map "$app_dir/pexcraft-wii.map" || true
          cp -f build/wii/pexcraft-wii.symbols.txt "$app_dir/pexcraft-wii.symbols.txt" || true
          dol_size=$(wc -c < "$app_dir/boot.dol")
          printf "boot.dol uncompressed size: %s bytes\n" "$dol_size" > "$app_dir/DOL_SIZE.txt"
          if [ "$dol_size" -gt 16777216 ]; then
            echo "ERROR: packaged boot.dol is too large (${dol_size} bytes). Refusing zip." >&2
            exit 1
          fi
          # Wii textures are embedded in boot.dol from client.jar-derived MCRW assets.
          # Do not ship a required external assets/ texture folder for Wii.
          cp -R platforms/wii "$app_dir/wii-port-source" || true
          cp -R logs "$package_dir/logs" || true
          if [ -f build/wii_generated/wii_mcrw_assets.pak ]; then
            wc -c build/wii_generated/wii_mcrw_assets.pak > "$app_dir/EMBEDDED_TEXTURES.txt"
          fi

          cat > "$app_dir/meta.xml" <<EOF
          <?xml version="1.0" encoding="UTF-8" standalone="yes"?>
          <app version="1">
            <name>PexCraft</name>
            <coder>PexCraft contributors</coder>
            <version>${{ github.sha }}</version>
            <release_date>$(date -u +%Y%m%d%H%M%S)</release_date>
            <short_description>PexCraft Wii port</short_description>
            <long_description>PexCraft Nintendo Wii homebrew build generated by GitHub Actions using devkitPPC/libogc. Minecraft Classic textures are converted from client.jar and embedded into boot.dol.</long_description>
          </app>
          EOF

          cat > "$package_dir/COMMIT_NAME.txt" <<EOF
          Commit name: ${{ steps.commit.outputs.name }}
          Commit SHA:  $GITHUB_SHA
          Builder:     Nintendo Wii / devkitPPC + libogc
          EOF

          zip_path="dist/$artifact_prefix.zip"
          (cd "$package_dir" && zip -r "../$(basename "$zip_path")" .)
          echo "Wii zip listing with uncompressed sizes:"
          unzip -lv "$zip_path"
          zip_dol_size=$(unzip -l "$zip_path" "apps/pexcraft/boot.dol" | awk '/boot[.]dol$/ {print $1}')
          if [ -z "$zip_dol_size" ] || [ "$zip_dol_size" -gt 16777216 ]; then
            echo "ERROR: boot.dol inside zip is too large (${zip_dol_size:-missing} bytes)." >&2
            exit 1
          fi
          echo "ZIP_PATH=$zip_path" >> "$GITHUB_ENV"

      - name: Upload Wii build to Telegram
        if: env.WII_BUILD_OK == '1' && github.event_name != 'pull_request'
        env:
          TOKEN: ${{ secrets.TOKEN }}
          CHAT_ID: ${{ env.CHAT_ID }}
          FILE_PATH: ${{ env.ZIP_PATH }}
          COMMIT_NAME: ${{ steps.commit.outputs.name }}
          BUILDER: Nintendo Wii DOL
        shell: bash
        run: python3 .github/scripts/telegram_upload_file.py

      - name: Mark failed build in summary
        if: always() && env.WII_BUILD_OK != '1'
        shell: bash
        run: |
          echo "### Nintendo Wii DOL failed" >> "$GITHUB_STEP_SUMMARY"
          echo "Commit name: \`${{ steps.commit.outputs.name }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "No Telegram upload produced for this builder." >> "$GITHUB_STEP_SUMMARY"

  psp:
    needs: notify_build_start
    name: Sony PSP EBOOT - ${{ github.event.head_commit.message || github.ref_name }}
    if: >-
      ${{
        contains(github.event.head_commit.message || github.event.pull_request.title || github.ref_name, '(console-only)') ||
        contains(github.event.head_commit.message || github.event.pull_request.title || github.ref_name, '(psp-only)')
      }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          set-safe-directory: true

      - name: Read commit name
        id: commit
        shell: bash
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE" || true
          name="$(git log -1 --pretty=%s 2>/dev/null || true)"
          [ -n "$name" ] || name="${{ github.event.head_commit.message || github.ref_name }}"
          safe="$(printf '%s' "$name" | tr -cs 'A-Za-z0-9._-' '-' | sed 's/^-//;s/-$//' | cut -c1-80)"
          [ -n "$safe" ] || safe="commit"
          echo "name=$name" >> "$GITHUB_OUTPUT"
          echo "safe=$safe" >> "$GITHUB_OUTPUT"

      - name: Prepare PSP embedded texture bundle
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y python3-pil
          # Reuse the exact verified download/staging pipeline used by the
          # standalone WASM builder, then convert that Release tree for PSP.
          python3 tools/prepare_wasm_assets.py \
            --output build/psp_wasm_assets \
            --cache .cache/pexcraft/minecraft-1.2.5-client.jar
          python3 tools/prepare_psp_assets.py \
            --release build/psp_wasm_assets/Release \
            --manifest build/psp_wasm_assets/wasm-assets-manifest.json \
            --out-assets build/psp_generated/assets \
            --embed-c src/assets/psp_embedded_classic_pack.c \
            --pak build/psp_generated/psp_mcrw_assets.pak \
            --asm build/psp_generated/psp_mcrw_assets.S

      - name: Build PSP EBOOT
        shell: bash
        run: |
          set +e
          set -o pipefail
          mkdir -p build logs dist
          {
            echo "Commit name: ${{ steps.commit.outputs.name }}"
            echo "Commit SHA:  $GITHUB_SHA"
            echo "Builder:     Sony PSP / pspdev"
            echo
            docker pull pspdev/pspdev:latest
            docker run --rm \
              -v "$PWD:/work" \
              -w /work \
              pspdev/pspdev:latest \
              bash -lc 'make -f Makefile.psp clean || true; make -f Makefile.psp'
            status=$?
            echo "$status" > build/psp-build-status.txt
            if [ "$status" -eq 0 ]; then
              echo "PSP_BUILD_OK=1" >> "$GITHUB_ENV"
            else
              echo "PSP_BUILD_OK=0" >> "$GITHUB_ENV"
            fi
            exit "$status"
          } 2>&1 | tee logs/build-psp.log
          exit ${PIPESTATUS[0]}

      - name: Package PSP app zip
        if: env.PSP_BUILD_OK == '1'
        shell: bash
        run: |
          set -euxo pipefail
          artifact_prefix="pexcraft-psp"
          package_dir="dist/$artifact_prefix"
          app_dir="$package_dir/PSP/GAME/PEXCRAFT"
          rm -rf "$package_dir"
          mkdir -p "$app_dir"
          test -s EBOOT.PBP
          cp -f EBOOT.PBP "$app_dir/EBOOT.PBP"
          cp -f PEXCRAFT.elf "$app_dir/PEXCRAFT.elf" || true
          cp -f PEXCRAFT.map "$app_dir/PEXCRAFT.map" || true
          cp -R logs "$package_dir/logs" || true
          cat > "$package_dir/COMMIT_NAME.txt" <<EOF
          Commit name: ${{ steps.commit.outputs.name }}
          Commit SHA:  $GITHUB_SHA
          Builder:     Sony PSP / pspdev
          EOF
          zip_path="dist/$artifact_prefix.zip"
          (cd "$package_dir" && zip -r "../$(basename "$zip_path")" .)
          echo "ZIP_PATH=$zip_path" >> "$GITHUB_ENV"

      - name: Upload PSP build to Telegram
        if: env.PSP_BUILD_OK == '1' && github.event_name != 'pull_request'
        env:
          TOKEN: ${{ secrets.TOKEN }}
          CHAT_ID: ${{ env.CHAT_ID }}
          FILE_PATH: ${{ env.ZIP_PATH }}
          COMMIT_NAME: ${{ steps.commit.outputs.name }}
          BUILDER: Sony PSP EBOOT
        shell: bash
        run: python3 .github/scripts/telegram_upload_file.py

      - name: Mark failed build in summary
        if: always() && env.PSP_BUILD_OK != '1'
        shell: bash
        run: |
          echo "### Sony PSP EBOOT failed" >> "$GITHUB_STEP_SUMMARY"
          echo "Commit name: \`${{ steps.commit.outputs.name }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "No Telegram upload produced for this builder." >> "$GITHUB_STEP_SUMMARY"

  xbox_uwp:
    needs: notify_build_start
    name: Xbox One UWP Dev Mode - ${{ github.event.head_commit.message || github.ref_name }}
    if: >-
      ${{
        contains(github.event.head_commit.message || github.event.pull_request.title || github.ref_name, '(console-only)') ||
        contains(github.event.head_commit.message || github.event.pull_request.title || github.ref_name, '(xbox-only)')
      }}
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          set-safe-directory: true

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Read commit name
        id: commit
        shell: bash
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE" || true
          name="$(git log -1 --pretty=%s 2>/dev/null || true)"
          [ -n "$name" ] || name="${{ github.event.head_commit.message || github.ref_name }}"
          safe="$(printf '%s' "$name" | tr -cs 'A-Za-z0-9._-' '-' | sed 's/^-//;s/-$//' | cut -c1-80)"
          [ -n "$safe" ] || safe="commit"
          echo "name=$name" >> "$GITHUB_OUTPUT"
          echo "safe=$safe" >> "$GITHUB_OUTPUT"

      - name: Build Xbox One UWP Dev Mode appx
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path build,logs,dist | Out-Null
          try {
            & powershell -NoProfile -ExecutionPolicy Bypass -File platforms/xbox_uwp/build_xbox_uwp.ps1 -Configuration Release -Platform x64 2>&1 | Tee-Object -FilePath logs/build-xbox-uwp.log
            if ($LASTEXITCODE -ne 0) { throw "build_xbox_uwp.ps1 failed with $LASTEXITCODE" }
            "XBOX_UWP_BUILD_OK=1" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          } catch {
            $_ | Out-File -FilePath logs/build-xbox-uwp.log -Append
            "XBOX_UWP_BUILD_OK=0" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            exit 1
          }

      - name: Attach commit/build info
        if: env.XBOX_UWP_BUILD_OK == '1'
        shell: pwsh
        run: |
          $pkg = Get-ChildItem -Path dist -Recurse -File -Include 'pexcraft-xbox-one-uwp-devmode.appx','pexcraft-xbox-one-uwp-devmode.msix','pexcraft-xbox-one-uwp-devmode.appxbundle','pexcraft-xbox-one-uwp-devmode.msixbundle' | Select-Object -First 1
          if (!$pkg) { throw "missing Xbox UWP appx/msix package in dist" }
          "XBOX_UWP_PATH=$($pkg.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Upload Xbox One UWP build to Telegram
        if: env.XBOX_UWP_BUILD_OK == '1' && github.event_name != 'pull_request'
        env:
          TOKEN: ${{ secrets.TOKEN }}
          CHAT_ID: ${{ env.CHAT_ID }}
          FILE_PATHS: |
            ${{ env.XBOX_UWP_PATH }}
            dist/pexcraft-xbox-one-uwp-devmode-build-notes.txt
            dist/pexcraft-xbox-one-uwp-devmode-testcert.cer
          COMMIT_NAME: ${{ steps.commit.outputs.name }}
          BUILDER: Xbox One UWP Dev Mode
        shell: pwsh
        run: |
          if (Get-Command python -ErrorAction SilentlyContinue) {
            python .github/scripts/telegram_upload_file.py
          } elseif (Get-Command py -ErrorAction SilentlyContinue) {
            py -3 .github/scripts/telegram_upload_file.py
          } else {
            throw "Python was not found for Telegram upload"
          }

      - name: Mark failed build in summary
        if: always() && env.XBOX_UWP_BUILD_OK != '1'
        shell: bash
        run: |
          echo "### Xbox One UWP Dev Mode failed" >> "$GITHUB_STEP_SUMMARY"
          echo "Commit name: \`${{ steps.commit.outputs.name }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "No Telegram upload produced for this builder." >> "$GITHUB_STEP_SUMMARY"

  wasm:
    needs: notify_build_start
    name: WebAssembly standalone HTML - ${{ github.event.head_commit.message || github.ref_name }}
