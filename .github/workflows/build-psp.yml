name: Build PSP EBOOT texture atlas view distance fix

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read

env:
  CHAT_ID: '-1004462705182'

jobs:
  build-psp:
    runs-on: ubuntu-latest
    env:
      TOKEN: ${{ secrets.TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Java classic assets for PSP
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p logs build dist
          python3 -m pip install --user pillow
          python3 tools/prepare_psp_assets.py build/psp_generated/assets src/assets/psp_embedded_classic_pack.c build/psp_generated/psp_mcrw_assets.pak build/psp_generated/psp_mcrw_assets.S 2>&1 | tee logs/prepare-psp-assets.log
          echo "Generated compact PSP asset pak summary:" | tee -a logs/prepare-psp-assets.log
          ls -lh build/psp_generated/psp_mcrw_assets.pak build/psp_generated/psp_mcrw_assets.S | tee -a logs/prepare-psp-assets.log
          python3 -c 'import pathlib, struct, sys; p=pathlib.Path("build/psp_generated/psp_mcrw_assets.pak").read_bytes(); magic=p[:8]; count=struct.unpack_from("<I", p, 8)[0] if len(p)>=12 and magic==b"PXCMCRW1" else 0; print("embedded_pak_magic", magic, "asset_count", count, "pak_bytes", len(p)); sys.exit(0 if count > 0 else "no PSP MCRW assets were packed")'

      - name: Build EBOOT.PBP with PSPSDK
        shell: bash
        run: |
          set -o pipefail
          mkdir -p logs build dist
          {
            set -eux
            echo "Generated assets:"
            find build/psp_generated/assets -maxdepth 1 -type f | sort
            docker run --rm \
              -v "$PWD:/src" \
              -w /src \
              pspdev/pspdev:latest \
              /bin/bash -lc '
                set -euxo pipefail
                if [ -z "${PSPDEV:-}" ]; then
                  if [ -d /usr/local/pspdev ]; then export PSPDEV=/usr/local/pspdev;
                  elif [ -d /opt/pspdev ]; then export PSPDEV=/opt/pspdev;
                  else export PSPDEV=$(dirname $(dirname $(command -v psp-gcc))); fi
                fi
                if [ -z "${PSPSDK:-}" ]; then
                  for d in "$PSPDEV/psp/sdk" /usr/local/pspdev/psp/sdk /opt/pspdev/psp/sdk; do
                    if [ -f "$d/lib/build.mak" ]; then export PSPSDK="$d"; break; fi
                  done
                fi
                export PATH="$PSPDEV/bin:$PSPDEV/psp/bin:$PATH"
                echo "PSPDEV=$PSPDEV"
                echo "PSPSDK=$PSPSDK"
                command -v psp-gcc
                test -f "$PSPSDK/lib/build.mak"
                make -f Makefile.psp clean || true
                make -f Makefile.psp all -j2
                psp-size PEXCRAFT.elf || true
                ls -lh PEXCRAFT.elf EBOOT.PBP || true
                if [ -f PEXCRAFT.map ]; then tail -80 PEXCRAFT.map || true; fi
              '
            test -f EBOOT.PBP
            file EBOOT.PBP || true
            python3 -c $'import struct, pathlib\np = pathlib.Path("EBOOT.PBP").read_bytes()\nif len(p) < 40 or p[:4] != b"\\0PBP":\n    raise SystemExit("EBOOT.PBP is not a valid PBP header")\nver = struct.unpack_from("<I", p, 4)[0]\noffs = struct.unpack_from("<8I", p, 8)\ndata_psp = offs[6]\ndata_psar = offs[7]\nmagic = p[data_psp:data_psp+4]\nprint("PBP version=0x%08x DATA.PSP offset=%d size=%d magic=%r" % (ver, data_psp, data_psar-data_psp, magic))\nif magic != b"\\x7fELF":\n    raise SystemExit("DATA.PSP inside EBOOT.PBP does not start with ELF magic; PBP would not boot")'
          } 2>&1 | tee logs/build-psp.log

      - name: Package PSP zip
        shell: bash
        run: |
          set -euxo pipefail
          rm -rf build/package
          mkdir -p build/package/PSP/GAME/PEXCRAFT
          cp EBOOT.PBP build/package/PSP/GAME/PEXCRAFT/EBOOT.PBP
          # Runtime is memory-only: no options.txt, saves, texturepacks, or assets folder.
          # The workflow embeds the converted Classic assets directly into EBOOT.PBP.
          (cd build/package && zip -r ../../dist/pexcraft-psp-eboot.zip PSP)
          ls -lh dist/pexcraft-psp-eboot.zip

      - name: Print logs
        if: always()
        shell: bash
        run: |
          echo "===== logs ====="
          ls -la logs || true
          for f in logs/*; do
            [ -f "$f" ] || continue
            echo "===== $f ====="
            cat "$f"
          done

      - name: Upload PSP build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pexcraft-psp-logs
          path: logs/*
          if-no-files-found: warn

      - name: Upload PSP EBOOT artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: pexcraft-psp-eboot
          path: dist/pexcraft-psp-eboot.zip
          if-no-files-found: error

      - name: Send PSP zip to Telegram
        if: success()
        shell: bash
        env:
          ZIP_PATH: dist/pexcraft-psp-eboot.zip
          CAPTION: PEXCraft PSP gameplay controls texture fix
        run: |
          set -euo pipefail
          if [ -z "${TOKEN}" ]; then
            echo "TOKEN secret is missing; skipping Telegram upload."
            exit 0
          fi
          test -f "$ZIP_PATH"
          python3 -c $'import os, sys, uuid, mimetypes, urllib.request\ntoken = os.environ["TOKEN"]\nchat_id = os.environ["CHAT_ID"]\nzip_path = os.environ["ZIP_PATH"]\ncaption = os.environ["CAPTION"] + "\\nRepo: " + os.environ.get("GITHUB_REPOSITORY", "") + "\\nCommit: " + os.environ.get("GITHUB_SHA", "")[:12]\nboundary = "----pexcraft-" + uuid.uuid4().hex\nparts = []\ndef field(name, value):\n    parts.append(("--%s\\r\\nContent-Disposition: form-data; name=\\"%s\\"\\r\\n\\r\\n%s\\r\\n" % (boundary, name, value)).encode())\ndef filefield(name, path):\n    filename = os.path.basename(path)\n    ctype = mimetypes.guess_type(filename)[0] or "application/zip"\n    parts.append(("--%s\\r\\nContent-Disposition: form-data; name=\\"%s\\"; filename=\\"%s\\"\\r\\nContent-Type: %s\\r\\n\\r\\n" % (boundary, name, filename, ctype)).encode())\n    with open(path, "rb") as f:\n        parts.append(f.read())\n    parts.append(b"\\r\\n")\nfield("chat_id", chat_id)\nfield("caption", caption)\nfilefield("document", zip_path)\nparts.append(("--%s--\\r\\n" % boundary).encode())\nreq = urllib.request.Request("https://api.telegram.org/bot%s/sendDocument" % token, data=b"".join(parts), headers={"Content-Type": "multipart/form-data; boundary=%s" % boundary})\nwith urllib.request.urlopen(req, timeout=180) as r:\n    sys.stdout.write(r.read().decode("utf-8", "replace"))'
