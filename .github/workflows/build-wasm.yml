name: Build standalone WASM and send only to Telegram

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

permissions:
  contents: read

env:
  CHAT_ID: '-1004462705182'

jobs:
  wasm:
    name: Standalone WebAssembly HTML
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          set-safe-directory: true

      - name: Read commit name
        id: commit
        shell: bash
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE" || true
          name="$(git log -1 --pretty=%s 2>/dev/null || true)"
          [ -n "$name" ] || name="${{ github.ref_name }}"
          echo "name=$name" >> "$GITHUB_OUTPUT"

      - name: Build one standalone HTML
        shell: bash
        run: ./build_wasm.sh

      - name: Verify no GitHub artifact or release output
        shell: bash
        run: |
          test -s dist/PexCraft-WASM.html
          test "$(find dist -maxdepth 1 -type f | wc -l)" -eq 1
          echo "Only dist/PexCraft-WASM.html will be uploaded, directly to Telegram."

      - name: Upload standalone HTML directly to Telegram
        env:
          TOKEN: ${{ secrets.TOKEN }}
          CHAT_ID: ${{ env.CHAT_ID }}
          FILE_PATH: dist/PexCraft-WASM.html
          COMMIT_NAME: ${{ steps.commit.outputs.name }}
          BUILDER: WebAssembly single-file HTML
        run: python3 .github/scripts/telegram_upload_file.py
