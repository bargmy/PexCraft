<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'unsafe-inline' 'unsafe-eval' 'wasm-unsafe-eval'; style-src 'unsafe-inline'; img-src data: blob:; media-src data: blob:; connect-src 'none'; worker-src blob:">
  <title>{{{ TITLE }}}</title>
  <style>
    html,body{width:100%;height:100%;margin:0;overflow:hidden;background:#000}
    body{-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;overscroll-behavior:none}
    #wrap{position:fixed;inset:0;width:100vw;height:100vh;height:100dvh;display:block;background:#000;overflow:hidden}
    canvas.emscripten{width:100%;height:100%;display:block;border:0;outline:0;image-rendering:auto;touch-action:none;-webkit-user-drag:none;user-select:none}
  </style>
</head>
<body>
  <div id="wrap">
    <canvas id="canvas" class="emscripten" tabindex="-1" draggable="false"></canvas>
  </div>
  <script>
    const canvas = document.getElementById('canvas');
    const blockCanvasGesture = event => event.preventDefault();
    canvas.addEventListener('contextmenu', blockCanvasGesture);
    canvas.addEventListener('dragstart', blockCanvasGesture);
    canvas.addEventListener('selectstart', blockCanvasGesture);
    canvas.addEventListener('touchmove', blockCanvasGesture, {passive:false});

    var Module = {
      canvas,
      noInitialRun: false,
      pexIdbSyncBusy: false,
      pexIdbSyncAgain: false,
      print: (...args) => console.log(...args),
      printErr: (...args) => console.error(...args),
      setStatus() {},
      pexSyncPersistentStorage() {
        if (typeof FS === 'undefined') return;
        if (Module.pexIdbSyncBusy) {
          Module.pexIdbSyncAgain = true;
          return;
        }
        Module.pexIdbSyncBusy = true;
        FS.syncfs(false, function (error) {
          Module.pexIdbSyncBusy = false;
          if (error) console.error('PexCraft persistent-storage sync failed:', error);
          if (Module.pexIdbSyncAgain) {
            Module.pexIdbSyncAgain = false;
            Module.pexSyncPersistentStorage();
          }
        });
      },
      pexPickLocalFile({accept, maxBytes, dataPath, namePath, callback}) {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = accept;
        input.style.display = 'none';
        input.addEventListener('change', async () => {
          const file = input.files && input.files[0];
          input.remove();
          if (!file) return;
          if (file.size <= 0 || file.size > maxBytes) {
            alert('The selected file is empty or too large.');
            return;
          }
          try {
            const bytes = new Uint8Array(await file.arrayBuffer());
            FS.mkdirTree(dataPath.slice(0, dataPath.lastIndexOf('/')));
            FS.writeFile(dataPath, bytes);
            if (namePath) FS.writeFile(namePath, file.name, {encoding: 'utf8'});
            const fn = Module[callback];
            if (typeof fn !== 'function') throw new Error('WASM import callback is unavailable: ' + callback);
            fn();
          } catch (error) {
            console.error(error);
            alert('PexCraft could not import that file.');
          }
        }, {once: true});
        document.body.appendChild(input);
        input.click();
      },
      pexPickSkin() {
        Module.pexPickLocalFile({
          accept: '.png,image/png',
          maxBytes: 8 * 1024 * 1024,
          dataPath: '/persist/skins/custom.png',
          namePath: null,
          callback: '_pex_wasm_finish_skin_import'
        });
      },
      pexPickTexturePack() {
        Module.pexPickLocalFile({
          accept: '.zip,application/zip,application/x-zip-compressed',
          maxBytes: 128 * 1024 * 1024,
          dataPath: '/persist/imports/texturepack.zip',
          namePath: '/persist/imports/texturepack.name',
          callback: '_pex_wasm_finish_texture_pack_import'
        });
      },
      preRun: [function () {
        try { FS.mkdir('/persist'); } catch (_) {}
        try { FS.mount(IDBFS, {autoPersist: true}, '/persist'); } catch (error) {
          console.warn('Persistent storage unavailable; using temporary storage.', error);
          return;
        }
        addRunDependency('pexcraft-idbfs-load');
        FS.syncfs(true, function (error) {
          if (error) console.warn('Could not load PexCraft persistent storage:', error);
          removeRunDependency('pexcraft-idbfs-load');
        });
      }]
    };

    document.addEventListener('pointerlockchange', () => {
      if (!document.pointerLockElement && typeof Module._pex_wasm_pointer_lock_lost === 'function') {
        try { Module._pex_wasm_pointer_lock_lost(); } catch (error) { console.error(error); }
      }
    });

    const flushBeforeSuspend = () => {
      if (typeof Module._pex_wasm_visibility_flush === 'function') {
        try { Module._pex_wasm_visibility_flush(); } catch (error) { console.error(error); }
      }
    };
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'hidden') flushBeforeSuspend();
    });
    window.addEventListener('pagehide', flushBeforeSuspend);
    window.addEventListener('beforeunload', flushBeforeSuspend);
    document.addEventListener('freeze', flushBeforeSuspend);
    window.addEventListener('error', event => console.error('PexCraft failed to start:', event.message || event.error));
  </script>
  {{{ SCRIPT }}}
</body>
</html>
