<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'unsafe-inline' 'unsafe-eval' 'wasm-unsafe-eval'; style-src 'unsafe-inline'; img-src data: blob:; media-src data: blob:; connect-src 'none'; worker-src blob:">
  <title>{{{ TITLE }}}</title>
  <style>
    html,body{width:100%;height:100%;margin:0;overflow:hidden;background:#111;color:#ddd;font:14px system-ui,sans-serif}
    #wrap{position:fixed;inset:0;width:100vw;height:100vh;height:100dvh;display:block;background:#111}
    canvas.emscripten{width:100%;height:100%;display:block;border:0;outline:0;image-rendering:auto}
    #status{position:fixed;z-index:2;left:50%;top:50%;transform:translate(-50%,-50%);max-width:80vw;padding:12px 16px;background:#202020;border:1px solid #555;text-align:center;white-space:pre-line}
    #progress{width:min(420px,70vw);margin-top:10px}
  </style>
</head>
<body>
  <div id="wrap">
    <canvas id="canvas" class="emscripten" tabindex="-1" oncontextmenu="event.preventDefault()"></canvas>
  </div>
  <div id="status">Loading PexCraft WebAssembly…<br><progress id="progress" value="0" max="100"></progress></div>
  <script>
    const statusElement = document.getElementById('status');
    const progressElement = document.getElementById('progress');
    var Module = {
      canvas: document.getElementById('canvas'),
      noInitialRun: false,
      pexIdbSyncBusy: false,
      print: (...args) => console.log(...args),
      printErr: (...args) => console.error(...args),
      setStatus(text) {
        const match = String(text || '').match(/^(.*)\((\d+)\/(\d+)\)$/);
        if (match) {
          statusElement.childNodes[0].textContent = match[1].trim() + ' ';
          progressElement.value = Number(match[2]) * 100 / Number(match[3]);
          progressElement.style.display = 'inline-block';
        } else {
          statusElement.childNodes[0].textContent = String(text || '');
          progressElement.style.display = text ? 'inline-block' : 'none';
        }
      },
      preRun: [function () {
        try { FS.mkdir('/persist'); } catch (_) {}
        try { FS.mount(IDBFS, {}, '/persist'); } catch (error) {
          console.warn('Persistent storage unavailable; using temporary storage.', error);
          return;
        }
        addRunDependency('pexcraft-idbfs-load');
        FS.syncfs(true, function (error) {
          if (error) console.warn('Could not load PexCraft persistent storage:', error);
          removeRunDependency('pexcraft-idbfs-load');
        });
      }]
    };
    window.addEventListener('error', event => {
      Module.setStatus('PexCraft failed to start:\n' + (event.message || 'Unknown browser error'));
    });
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'hidden' && Module._pex_wasm_visibility_flush) {
        try { Module._pex_wasm_visibility_flush(); } catch (error) { console.error(error); }
      }
    });
    window.addEventListener('pagehide', () => {
      if (Module._pex_wasm_visibility_flush) {
        try { Module._pex_wasm_visibility_flush(); } catch (_) {}
      }
    });
  </script>
  {{{ SCRIPT }}}
</body>
</html>
